<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
        background: #faf9f7;
      }
      .canvas {
        width: 1080px;
        height: 1080px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: linear-gradient(180deg, #faf9f7 0%, #f5f5f4 100%);
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 48px 56px 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 28px;
        font-weight: 700;
        color: #1c1917;
      }
      .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: #5f8a7a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
      }
      .ship-badge {
        padding: 12px 22px;
        border-radius: 999px;
        background: #4d7366;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
      }
      .photo-wrap {
        margin: 0 56px;
        border-radius: 32px;
        background: #fff;
        border: 3px solid #e7e5e4;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        box-shadow: 0 16px 48px rgba(0,0,0,0.06);
      }
      .photo-wrap img {
        width: 100%;
        height: 100%;
        max-height: 620px;
        object-fit: contain;
        padding: 32px;
      }
      .bottom {
        padding: 32px 56px 52px;
        text-align: left;
      }
      .dept {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #5f8a7a;
      }
      .name {
        margin-top: 10px;
        font-size: 40px;
        font-weight: 800;
        line-height: 1.12;
        letter-spacing: -0.03em;
        color: #1c1917;
        max-width: 960px;
      }
      .row {
        margin-top: 20px;
        display: flex;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
      }
      .price {
        font-size: 52px;
        font-weight: 800;
        color: #4d7366;
        letter-spacing: -0.03em;
      }
      .compare {
        font-size: 28px;
        font-weight: 600;
        color: #a8a29e;
        text-decoration: line-through;
      }
      .delivered {
        font-size: 22px;
        font-weight: 700;
        color: #78716c;
      }
      .url {
        margin-top: 16px;
        font-size: 22px;
        font-weight: 700;
        color: #5f8a7a;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <header class="top">
        <div class="brand"><div class="mark">T</div> Trove</div>
        <div class="ship-badge">Free shipping 🇺🇸</div>
      </header>
      <div class="photo-wrap"><img id="img" alt="" /></div>
      <footer class="bottom">
        <div class="dept" id="badge"></div>
        <h1 class="name" id="product"></h1>
        <div class="row">
          <span class="price" id="price"></span>
          <span class="compare" id="compare"></span>
        </div>
        <div class="delivered">Delivered · 3–5 business days</div>
        <div class="url">trove-us.com</div>
      </footer>
    </div>
    <script>
      const p = new URLSearchParams(location.search);
      document.getElementById("product").textContent = p.get("product") || "Trove pick";
      document.getElementById("price").textContent = p.get("price") || "$12.99";
      document.getElementById("badge").textContent = p.get("badge") || "Trove";
      document.getElementById("compare").textContent = p.get("compare") ? `Was ${p.get("compare")}` : "";
      const img = document.getElementById("img");
      img.src = p.get("image") || "";
    </script>
  </body>
</html>
